<!doctype html>
<html lang='en'>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculadora</title>
</head>

<body>
  <div style="width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <h1>Calculadora</h1>
  </div>
    <hr>
  <div style="width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;"> 
    <input id="a" type="number"></input>
    <fieldset id="op">
      <legend>Operação</legend>
      <input type="radio" id="+" name="op" value="+">
      <label for="+">+</label>
      <input type="radio" id="-" name="op" value="-">
      <label for="-">-</label>
    </fieldset>
    <input id="b" type="number"></input>
    <br/>
    <button id="calc" style="margin: 10px;">Calcular!</button>
    <br/>
    <p id="res"></p>
  </div>
  <script>
    let a = document.getElementById('a');
    let b = document.getElementById('b');
    let calc = document.getElementById('calc');
    let res = document.getElementById('res');

    calc.addEventListener('click', () => {
      let op = document.getElementById('+').checked ? "+" : "-"

      if (op === "+")
        res.textContent = +a.value + +b.value + "(+ Calculado no js!)"
      else 
        res.textContent = +a.value - +b.value + "(- Calculado no js!)"
    
      fetch(`/${op === "+" ? "p" : "m"}/${+a.value}/${+b.value}`, { method: 'GET', body: {
        op,
        a: +a.value,
        b: +b.value
      } }).then(response => {
        res.textContent = response.body.res
      });  
    
     }, false)
  </script>
</body>
